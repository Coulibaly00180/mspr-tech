name: CI/CD GitOps Pipeline - COFRAP Front

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'front/**' # Se déclenche uniquement si des fichiers du dossier front sont modifiés
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'front/**' # Se déclenche uniquement si la PR concerne le dossier front

jobs:
  # =======================================================
  # JOB 1 : VALIDATION (S'exécute pour toutes les branches)
  # =======================================================
  validate:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      # 1. Récupération du code du dépôt
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configuration de l'environnement Node/NPM via Volta
      - name: Setup Volta (Node & NPM)
        uses: volta-cli/action@v1
        with:
          package-json-path: '${{ github.workspace }}/front/package.json'

      # 3. Installation propre des dépendances du Front
      - name: Install Dependencies
        run: |
          cd front
          npm ci 

      # 4. Scan de sécurité des dépendances (DevSecOps)
      - name: CyberSecurity Scan (npm audit)
        run: |
          cd front
          npm audit --audit-level=high

      # 5. Exécution de tous les tests (Unitaires + vos 4 fichiers d'Intégration)
      - name: Run All Tests (Jest)
        run: |
          cd front
          npm test -- --watchAll=false

      # 6. Génération d'un identifiant court (SHA) pour taguer l'image Docker
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  # =======================================================
  # JOB 2 : DEPLOY (S'exécute UNIQUEMENT sur MAIN / MASTER)
  # =======================================================
  deploy:
    runs-on: ubuntu-latest
    needs: validate # Attend obligatoirement que le Job 'validate' soit une réussite totale
    # Condition stricte : Uniquement si le push ou la PR cible la branche de production (main ou master)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.base_ref == 'main' || github.base_ref == 'master'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- ÉTAPE A : CONNEXION ET PUSH SUR DOCKER HUB ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/access-secure-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/access-secure-front:${{ needs.validate.outputs.image_tag }}

      # --- ÉTAPE B : MISE À JOUR DU DÉPÔT D'INFRASTRUCTURE (GITOPS) ---
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          # /!\ PENSEZ À REMPLACER PAR VOTRE PROPRE NOM DE DÉPÔT GITHUB INFRA /!\
          repository: 'TON_COMPTE_GITHUB/TON_DEPOT_INFRA'
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: 'infra-repo'

      - name: Update Kustomize Image Tag
        run: |
          # Navigation jusqu'au dossier contenant le kustomization.yaml de l'environnement DEV
          cd infra-repo/apps/dev 
          
          # Modifie automatiquement le champ "newTag:" avec le SHA du commit actuel
          sed -i "s|newTag:.*|newTag: ${{ needs.validate.outputs.image_tag }}|g" kustomization.yaml
          
      - name: Commit & Push to Infra Repo
        run: |
          cd infra-repo
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "chore(dev-deploy): update front image tag to ${{ needs.validate.outputs.image_tag }} [skip ci]"
          git push origin main