name: CI/CD GitOps Pipeline - COFRAP Front

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'front/**'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'front/**'

jobs:
  # ==========================================
  # JOB 1 : VALIDATION & EXTRACTION VERSION
  # ==========================================
  validate:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.package-version.outputs.version }} # On exporte la version pour le job de deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Étape Magique : Extrait la version du package.json du Front
      - name: Read Package Version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: front

      - name: Setup Volta (Node & NPM)
        uses: volta-cli/action@v1
        with:
          package-json-path: '${{ github.workspace }}/front/package.json'

      - name: Install Dependencies
        run: |
          cd front
          npm ci 

      # Scan ciblé uniquement sur la prod suite à notre analyse DevSecOps
      - name: CyberSecurity Scan (npm audit)
        run: |
          cd front
          npm audit --only=prod --audit-level=high

      - name: Run All Tests (Jest)
        run: |
          cd front
          npm test -- --watchAll=false

  # ==========================================
  # JOB 2 : DEPLOY (S'exécute UNIQUEMENT sur MAIN / MASTER)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.base_ref == 'main' || github.base_ref == 'master'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et Push en utilisant le tag de version (ex: msprepsi/access-secure-front:0.1.0)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/access-secure-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/access-secure-front:${{ needs.validate.outputs.app_version }}

      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: 'TON_COMPTE_GITHUB/TON_DEPOT_INFRA' # /!\ À adapter
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: 'infra-repo'

      # Kustomize met maintenant à jour le tag avec le numéro de version (ex: 0.1.0)
      - name: Update Kustomize Image Tag
        run: |
          cd infra-repo/apps/dev 
          sed -i "s|newTag:.*|newTag: ${{ needs.validate.outputs.app_version }}|g" kustomization.yaml
          
      - name: Commit & Push to Infra Repo
        run: |
          cd infra-repo
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "chore(dev-deploy): update front image tag to v${{ needs.validate.outputs.app_version }} [skip ci]"
          git push origin main
