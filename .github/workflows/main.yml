name: CI/CD GitOps Pipeline - COFRAP Front

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'front/**'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'front/**'

jobs:
  # ==========================================
  # JOB 1 : VALIDATION & EXTRACTION VERSION (S'exécute partout, même sur develop)
  # ==========================================
  validate:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.package-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Package Version
        id: package-version
        run: |
          VERSION=$(node -p "require('./front/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Volta (Node & NPM)
        uses: volta-cli/action@v1
        with:
          package-json-path: '${{ github.workspace }}/front/package.json'

      - name: Install Dependencies
        run: |
          cd front
          npm ci 

      - name: CyberSecurity Scan (npm audit)
        run: |
          cd front
          npm audit --only=prod --audit-level=high

      - name: Run All Tests (Jest)
        run: |
          cd front
          npm test -- --watchAll=false

  # ==========================================
  # JOB 2 : DEPLOY (S'exécute UNIQUEMENT sur MAIN / MASTER)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et Push avec le tag "latest" ET le tag SemVer dynamique de ton package.json
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cofrap-webapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cofrap-webapp:${{ needs.validate.outputs.app_version }}

